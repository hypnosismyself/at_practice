name: Головная сборка

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: Набор тестов
        required: true
        default: Приемочные
        type: choice
        options:
          - Смоки
          - Приемочные

jobs:

  test:
    name: Тесты
    runs-on: ubuntu-latest
    steps:
      - name: Переключаемся на репозиторий
        uses: actions/checkout@v3
      - name: Поднимаем тестовый сайт
        run: |
          git clone https://github.com/manikosto/qa-automation-sandbox
          cd qa-automation-sandbox
          docker compose up -d --build
          sleep 10   # даём время контейнерам подняться
      - name: Устанавливаем Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      - name: Устанавливаем Chrome
        run: sudo apt-get install google-chrome-stable
      - name: Устанавливаем зависимости
        run: pip install -r requirements.txt
      - name: Запускаем тесты
        run: pytest ./tests -v --alluredir=allure-results
      - name: Выгружаем отчет
        uses: actions/upload-artifact@v7.0.1
        with:
          name: allure-results
          path:
            allure-results
          retention-days: 3

  generate-report:
    runs-on: ubuntu-latest
    needs: test
    name: Создать отчет
    steps:
      - name: Устанавливаем Java
        uses: actions/setup-java@v3
        with:
          distribution: 'microsoft'
          java-version: '17'
      - run: | 
          sudo wget https://github.com/allure-framework/allure2/releases/download/2.23.1/allure-2.23.1.tgz
          sudo tar -zxvf allure-2.23.1.tgz -C /opt/
          sudo ln -s /opt/allure-2.23.1/bin/allure /usr/bin/allure
      - name: Выкачиваем артефакты
        uses: actions/download-artifact@v8.0.1
      - name: Генерируем отчет
        run: allure generate -c allure-results -o _site
      - name: Сохраняем отчет
        uses: actions/upload-artifact@v7.0.1
        with:
          name: _site
          path:
            _site
          retention-days: 1

  publish-report:
    runs-on: ubuntu-latest
    needs: generate-report
    name: Опубликовать отчет
    steps:
      - name: Получаем артефакты прогона
        uses: actions/download-artifact@v8.0.1
      - name: Подгружаем артефакты в пейдж
        uses: actions/upload-pages-artifact@v5.0.0
      - name: Деплоим в GitHubPages
        id: deployment
        uses: actions/deploy-pages@v5.0.0